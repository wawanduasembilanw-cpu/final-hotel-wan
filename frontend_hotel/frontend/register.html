<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Akun — Wan Hotel</title>
  <meta name="description" content="Buat akun baru di Wan Hotel dan nikmati kemudahan booking kamar hotel terbaik."/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrapper" style="padding: 32px 16px;">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-logo mb-1">Wan<span>Hotel</span></div>
    <p class="auth-subtitle">Buat akun baru dan mulai perjalanan bersama kami.</p>

    <form id="register-form">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold" for="name">Nama Lengkap <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-person text-primary"></i></span>
            <input type="text" class="form-control" id="name" placeholder="Nama lengkap Anda" required/>
          </div>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-semibold" for="username">Username <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-at text-primary"></i></span>
            <input type="text" class="form-control" id="username" placeholder="username" required/>
          </div>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-semibold" for="email">Email <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-envelope text-primary"></i></span>
            <input type="email" class="form-control" id="email" placeholder="email@contoh.com" required/>
          </div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold" for="password">Password <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-lock text-primary"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Minimal 6 karakter" required minlength="6"/>
            <button class="input-group-text bg-white border-start-0" type="button" id="toggle-pass">
              <i class="bi bi-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-semibold" for="phone">No. Telepon</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-telephone text-primary"></i></span>
            <input type="tel" class="form-control" id="phone" placeholder="08xxxxxxxxxx"/>
          </div>
        </div>
        <div class="col-sm-6">
          <label class="form-label fw-semibold" for="address">Alamat</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-geo-alt text-primary"></i></span>
            <input type="text" class="form-control" id="address" placeholder="Kota, Provinsi"/>
          </div>
        </div>
      </div>

      <div id="alert-box" class="alert d-none mt-3 mb-0" role="alert"></div>

      <button type="submit" class="btn btn-wan-primary w-100 py-2 mt-4" id="btn-register">
        <span id="btn-text"><i class="bi bi-person-plus me-2"></i>Buat Akun</span>
        <span id="btn-spinner" class="d-none spinner-border spinner-border-sm"></span>
      </button>

      <div class="text-center mt-3" style="font-size:0.88rem;">
        Sudah punya akun?
        <a href="/login.html" class="text-primary fw-semibold">Masuk di sini</a>
      </div>
    </form>

    <div class="text-center mt-4" style="font-size:0.82rem;color:#9CA3AF;">
      <a href="/index.html" class="text-secondary"><i class="bi bi-arrow-left me-1"></i>Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  if (isLoggedIn()) window.location.href = '/index.html';

  document.getElementById('toggle-pass').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const ic = document.getElementById('eye-icon');
    if (pw.type === 'password') { pw.type = 'text'; ic.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; ic.className = 'bi bi-eye'; }
  });

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('alert-box');
    const btnTxt  = document.getElementById('btn-text');
    const btnSp   = document.getElementById('btn-spinner');

    alertEl.className = 'alert d-none mt-3 mb-0';
    btnTxt.classList.add('d-none'); btnSp.classList.remove('d-none');

    try {
      await api.post('/auth/register', {
        name:     document.getElementById('name').value.trim(),
        username: document.getElementById('username').value.trim(),
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        phone:    document.getElementById('phone').value.trim() || undefined,
        address:  document.getElementById('address').value.trim() || undefined,
      });

      alertEl.className = 'alert alert-success mt-3 mb-0';
      alertEl.innerHTML = '<i class="bi bi-check-circle me-2"></i>Registrasi berhasil! Mengarahkan ke halaman login...';
      setTimeout(() => window.location.href = '/login.html', 2000);
    } catch (err) {
      alertEl.className = 'alert alert-danger mt-3 mb-0';
      alertEl.textContent = err.message;
    } finally {
      btnTxt.classList.remove('d-none'); btnSp.classList.add('d-none');
    }
  });
</script>
</body>
</html>
