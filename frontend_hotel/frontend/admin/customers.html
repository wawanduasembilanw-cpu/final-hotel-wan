<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kelola Customer — Admin Wan Hotel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="admin-wrapper">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h4>Wan<span>Hotel</span></h4>
      <small>Admin Panel</small>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Utama</div>
      <div class="nav-item">
        <a href="dashboard.html" class="sidebar-link">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
      </div>

      <div class="nav-section-label">Master Data</div>
      <div class="nav-item">
        <a href="rooms.html" class="sidebar-link">
          <i class="bi bi-door-open"></i> Kamar
        </a>
      </div>
      <div class="nav-item">
        <a href="customers.html" class="sidebar-link active">
          <i class="bi bi-people"></i> Customer
        </a>
      </div>

      <div class="nav-section-label">Transaksi</div>
      <div class="nav-item">
        <a href="bookings.html" class="sidebar-link">
          <i class="bi bi-calendar-check"></i> Booking
        </a>
      </div>
      <div class="nav-item">
        <a href="payments.html" class="sidebar-link">
          <i class="bi bi-credit-card"></i> Pembayaran
        </a>
      </div>

      <div class="nav-section-label">Laporan</div>
      <div class="nav-item">
        <a href="reports.html" class="sidebar-link">
          <i class="bi bi-bar-chart"></i> Laporan
        </a>
      </div>

      <div class="nav-section-label">Lainnya</div>
      <div class="nav-item">
        <a href="/index.html" class="sidebar-link">
          <i class="bi bi-globe"></i> Lihat Website
        </a>
      </div>
      <div class="nav-item">
        <a href="#" class="sidebar-link text-danger" onclick="logout(); return false;">
          <i class="bi bi-box-arrow-right"></i> Keluar
        </a>
      </div>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="admin-content">
    <div class="admin-topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="toggleSidebar()" style="border-radius:8px;">
          <i class="bi bi-list"></i>
        </button>
        <div class="page-title">Kelola Customer</div>
      </div>
      <div id="admin-user-info"></div>
    </div>

    <!-- MAIN -->
    <div class="admin-main">
      <div class="content-card">
        <div class="content-card-header">
          <h5><i class="bi bi-people me-2 text-primary"></i>Daftar Customer</h5>
        </div>
        <div class="content-card-body">
          <div class="table-responsive">
            <table class="table table-striped table-hover table-wan w-100" id="customersTable">
              <thead>
                <tr>
                  <th>No</th>
                  <th>Nama Lengkap</th>
                  <th>Username</th>
                  <th>Email</th>
                  <th>Telepon</th>
                  <th>Alamat</th>
                  <th>Terdaftar</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="customers-tbody">
                <tr><td colspan="8" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  if (!requireAdmin()) {}
  updateAdminTopbar();
  
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }

  let table;

  async function loadCustomers() {
    try {
      if(table) table.destroy();
      const tbody = document.getElementById('customers-tbody');
      tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>';

      const customers = await api.get('/customers');
      
      tbody.innerHTML = customers.map((c, index) => {
        return `
          <tr>
            <td>${index + 1}</td>
            <td class="fw-bold">${c.name}</td>
            <td><span class="text-muted">@${c.username}</span></td>
            <td>${c.email}</td>
            <td>${c.phone || '-'}</td>
            <td>${c.address || '-'}</td>
            <td>${formatDate(c.created_at)}</td>
            <td>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${c.user_id})" title="Hapus"><i class="bi bi-trash"></i></button>
            </td>
          </tr>
        `;
      }).join('');

      table = $('#customersTable').DataTable({
        language: { url: '//cdn.datatables.net/plug-ins/1.13.7/i18n/id.json' },
        order: [[6, 'desc']] // default urut berdasarkan tgl daftar terbaru
      });
    } catch(err) {
      showToast(err.message, 'error');
    }
  }

  async function deleteCustomer(id) {
    const result = await Swal.fire({
      title: 'Hapus Customer?',
      text: "Data customer dan semua riwayat bookingnya akan dihapus permanen!",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#dc3545',
      cancelButtonColor: '#6c757d',
      confirmButtonText: 'Ya, Hapus!'
    });

    if (result.isConfirmed) {
      try {
        await api.delete(`/customers/${id}`);
        showToast('Customer berhasil dihapus', 'success');
        loadCustomers();
      } catch(e) {
        showToast(e.message, 'error');
      }
    }
  }

  loadCustomers();
</script>
</body>
</html>
