<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masuk — Wan Hotel</title>
  <meta name="description" content="Login ke akun Wan Hotel Anda untuk booking kamar hotel terbaik."/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo mb-1">Wan<span>Hotel</span></div>
    <p class="auth-subtitle">Selamat datang kembali! Silakan masuk ke akun Anda.</p>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="username">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-person text-primary"></i></span>
          <input type="text" class="form-control" id="username" placeholder="Masukkan username" required autocomplete="username"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock text-primary"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Masukkan password" required autocomplete="current-password"/>
          <button class="input-group-text bg-white border-start-0" type="button" id="toggle-pass" tabindex="-1">
            <i class="bi bi-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <div id="alert-box" class="alert d-none mb-3" role="alert"></div>

      <button type="submit" class="btn btn-wan-primary w-100 py-2 mb-3" id="btn-login">
        <span id="btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Masuk</span>
        <span id="btn-spinner" class="d-none spinner-border spinner-border-sm"></span>
      </button>

      <div class="text-center" style="font-size:0.88rem;">
        Belum punya akun?
        <a href="/register.html" class="text-primary fw-semibold">Daftar sekarang</a>
      </div>
    </form>

    <div class="mt-4 p-3 rounded" style="background:#F8F9FA;font-size:0.8rem;">
      <div class="fw-bold mb-1 text-secondary"><i class="bi bi-info-circle me-1"></i>Akun Demo</div>
      <div>Admin: <code>admin</code> / <code>admin123</code></div>
      <div>Customer: <code>budi_santoso</code> / <code>admin123</code></div>
    </div>

    <div class="text-center mt-4" style="font-size:0.82rem;color:#9CA3AF;">
      <a href="/index.html" class="text-secondary"><i class="bi bi-arrow-left me-1"></i>Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) {
    window.location.href = isAdmin() ? '/admin/dashboard.html' : '/index.html';
  }

  document.getElementById('toggle-pass').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const ic = document.getElementById('eye-icon');
    if (pw.type === 'password') { pw.type = 'text'; ic.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; ic.className = 'bi bi-eye'; }
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert  = document.getElementById('alert-box');
    const btnTxt = document.getElementById('btn-text');
    const btnSp  = document.getElementById('btn-spinner');

    alert.className = 'alert d-none mb-3';
    btnTxt.classList.add('d-none'); btnSp.classList.remove('d-none');

    try {
      const data = await api.post('/auth/login', {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      });

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      const redirect = sessionStorage.getItem('redirect_after_login');
      sessionStorage.removeItem('redirect_after_login');

      if (data.user.role === 'admin') {
        window.location.href = '/admin/dashboard.html';
      } else {
        window.location.href = redirect || '/index.html';
      }
    } catch (err) {
      alert.className = 'alert alert-danger mb-3';
      alert.textContent = err.message;
    } finally {
      btnTxt.classList.remove('d-none'); btnSp.classList.add('d-none');
    }
  });
</script>
</body>
</html>
